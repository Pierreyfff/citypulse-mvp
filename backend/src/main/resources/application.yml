spring:
  application:
    name: citypulse

  main:
    web-application-type: reactive

  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/citypulse}
    username: ${SPRING_R2DBC_USERNAME:citypulse}
    password: ${SPRING_R2DBC_PASSWORD:citypulse123}

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:CityPulseSecretKey2026ForJWTTokenGenerationMustBe256BitsLong!}
  expiration: ${JWT_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:86400000}

logging:
  level:
    com.citypulse: DEBUG
    org.springframework.r2dbc: DEBUG
