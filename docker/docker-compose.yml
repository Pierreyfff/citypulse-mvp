services:
  db:
    image: postgres:16-alpine
    container_name: citypulse-db
    environment:
      POSTGRES_DB: citypulse
      POSTGRES_USER: citypulse
      POSTGRES_PASSWORD: citypulse123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citypulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: citypulse-backend
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://db:5432/citypulse
      SPRING_R2DBC_USERNAME: citypulse
      SPRING_R2DBC_PASSWORD: citypulse123
      JWT_SECRET: CityPulseSecretKey2026ForJWTTokenGenerationMustBe256BitsLong!
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: citypulse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
